---
# Project source code URL: https://github.com/go-gitea/gitea

gitea_enabled: true

gitea_identifier: gitea
gitea_base_path: "/{{ gitea_identifier }}"
gitea_data_path: "{{ gitea_base_path }}/data"
gitea_config_path: "{{ gitea_base_path }}/config"

# renovate: datasource=docker depName=gitea/gitea
gitea_version: 1.26.1

gitea_uid: ""
gitea_gid: ""

# The scheme used for serving Gitea.
gitea_scheme: https

# The hostname at which Gitea is served.
gitea_hostname: ""

# The path at which Gitea is served.
gitea_path_prefix: /

gitea_container_image: "{{ gitea_container_image_registry_prefix }}gitea/gitea:{{ gitea_container_image_tag }}"
gitea_container_image_tag: "{{ gitea_version }}-rootless"
gitea_container_image_registry_prefix: "{{ gitea_container_image_registry_prefix_upstream }}"
gitea_container_image_registry_prefix_upstream: "{{ gitea_container_image_registry_prefix_upstream_default }}"
gitea_container_image_registry_prefix_upstream_default: docker.io/

gitea_container_image_self_build: false
gitea_container_image_self_build_name: "go-gitea/gitea:{{ gitea_container_image_self_build_repo_version }}"
gitea_container_image_self_build_repo: "https://github.com/go-gitea/gitea.git"
gitea_container_image_self_build_repo_version: "{{ 'v' + gitea_version if gitea_version != 'latest' else 'main' }}"
gitea_container_image_self_build_src_files_path: "{{ gitea_base_path }}/docker-src"

# The base container network. It will be auto-created by this role if it doesn't exist already.
gitea_container_network: "{{ gitea_identifier }}"

# Control if the container network is deleted on uninstalling.
gitea_container_network_deletion_enabled: true

# Specify how the container publishes its HTTP port (as defined by `gitea_container_http_port`).
#
# Takes an "<ip>:<port>" or "<port>" value (e.g. "127.0.0.1:2586"), or empty string to not expose.
girea_container_http_host_bind_port: ""

# Specify how the metrics container publishes its HTTP port (as defined by `gitea_container_metrics_port`).
#
# Takes an "<ip>:<port>" or "<port>" value (e.g. "127.0.0.1:2586"), or empty string to not expose.
gitea_container_metrics_host_bind_port: ""

# Specify how the container publishes its SSH port (as defined by `gitea_container_ssh_port`).
#
# Takes an "<ip>:<port>" or "<port>" value (e.g. "127.0.0.1:2586"), or empty string to not expose.
gitea_container_ssh_host_bind_port: "{{ gitea_container_ssh_port }}"

# The port number in the container
gitea_container_http_port: 3000

# The port number of the metrics server in the container
gitea_container_metrics_port: 3000

# The port number in the container
gitea_container_ssh_port: 22

# A list of additional container networks that the container would be connected to.
# The role does not create these networks, so make sure they already exist.
# Use this to expose this container to another reverse proxy, which runs in a different container network.
gitea_container_additional_networks: "{{ gitea_container_additional_networks_auto + gitea_container_additional_networks_custom }}"
gitea_container_additional_networks_auto: []
gitea_container_additional_networks_custom: []

# gitea_container_labels_traefik_enabled controls whether labels to assist a Traefik reverse-proxy will be attached to the container.
# See `../templates/labels.j2` for details.
#
# To inject your own other container labels, see `gitea_container_labels_additional_labels_custom`.
gitea_container_labels_traefik_enabled: true
gitea_container_labels_traefik_docker_network: ""
gitea_container_labels_traefik_hostname: "{{ gitea_hostname }}"
# The path prefix must either be `/` or not end with a slash (e.g. `/gitea`).
gitea_container_labels_traefik_path_prefix: "{{ gitea_path_prefix }}"
gitea_container_labels_traefik_rule: "Host(`{{ gitea_container_labels_traefik_hostname }}`){% if gitea_container_labels_traefik_path_prefix != '/' %} && PathPrefix(`{{ gitea_container_labels_traefik_path_prefix | quote }}`){% endif %}"
gitea_container_labels_traefik_priority: 0
gitea_container_labels_traefik_entrypoints: web-secure
gitea_container_labels_traefik_tls: "{{ gitea_container_labels_traefik_entrypoints != 'web' }}"
gitea_container_labels_traefik_tls_certResolver: default  # noqa var-naming

# Controls if labels are added to expose the Prometheus metrics publicly.
gitea_container_labels_traefik_metrics_enabled: "{{ gitea_config_metrics_enabled }}"
gitea_container_labels_traefik_metrics_hostname: "{{ gitea_hostname }}"
# The path prefix must either be `/` or not end with a slash (e.g. `/metrics`).
gitea_container_labels_traefik_metrics_path_prefix: /metrics
gitea_container_labels_traefik_metrics_rule: "Host(`{{ gitea_container_labels_traefik_metrics_hostname }}`){% if gitea_container_labels_traefik_metrics_path_prefix != '/' %} && PathPrefix(`{{ gitea_container_labels_traefik_metrics_path_prefix }}`){% endif %}"
gitea_container_labels_traefik_metrics_priority: 0
gitea_container_labels_traefik_metrics_entrypoints: "{{ gitea_container_labels_traefik_entrypoints }}"
gitea_container_labels_traefik_metrics_middlewares: []
gitea_container_labels_traefik_metrics_tls: "{{ gitea_container_labels_traefik_metrics_entrypoints != 'web' }}"
gitea_container_labels_traefik_metrics_tls_certResolver: "{{ gitea_container_labels_traefik_tls_certResolver }}"  # noqa var-naming
gitea_container_labels_traefik_metrics_middleware_basic_auth_enabled: false
# See: https://doc.traefik.io/traefik/reference/routing-configuration/http/middlewares/basicauth/
gitea_container_labels_traefik_metrics_middleware_basic_auth_users: ""

# gitea_container_labels_traefik_tcp_enabled controls whether labels to assist a Traefik reverse-proxy for SSH connections will be attached to the container.
# See `../templates/labels.j2` for details.
#
# To inject your own other container labels, see `gitea_container_labels_additional_labels_custom`.
gitea_container_labels_traefik_tcp_enabled: true
gitea_container_labels_traefik_tcp_docker_network: "{{ gitea_container_network }}"
gitea_container_labels_traefik_tcp_rule: "HostSNI(`*`)"
gitea_container_labels_traefik_tcp_priority: 0
gitea_container_labels_traefik_tcp_entrypoints: ssh-gitea

# Controls whether a compression middleware will be injected into the middlewares list.
# This compression middleware is supposed to be defined elsewhere (using labels or a File provider, etc.) and is merely referenced by this router.
gitea_container_labels_traefik_compression_middleware_enabled: false
gitea_container_labels_traefik_compression_middleware_name: ""

# Controls which additional headers to attach to all HTTP requests.
# To add your own custom request headers, use `gitea_container_labels_traefik_additional_request_headers_custom`
gitea_container_labels_traefik_additional_request_headers: "{{ gitea_container_labels_traefik_additional_request_headers_auto | combine(gitea_container_labels_traefik_additional_request_headers_custom) }}"
gitea_container_labels_traefik_additional_request_headers_auto: |
  {{
    {}
    | combine ({'X-Script-Name': gitea_path_prefix} if gitea_path_prefix != '/' else {})
  }}
gitea_container_labels_traefik_additional_request_headers_custom: {}

# Controls which additional headers to attach to all HTTP responses.
# To add your own custom response headers, use `gitea_container_labels_traefik_additional_response_headers_custom`
gitea_container_labels_traefik_additional_response_headers: "{{ gitea_container_labels_traefik_additional_response_headers_auto | combine(gitea_container_labels_traefik_additional_response_headers_custom) }}"
gitea_container_labels_traefik_additional_response_headers_auto: |
  {{
    {}
    | combine ({'X-XSS-Protection': gitea_http_header_xss_protection} if gitea_http_header_xss_protection else {})
    | combine ({'X-Content-Type-Options': gitea_http_header_content_type_options} if gitea_http_header_content_type_options else {})
    | combine ({'Content-Security-Policy': gitea_http_header_content_security_policy} if gitea_http_header_content_security_policy else {})
    | combine ({'Permissions-Policy': gitea_http_header_permissions_policy} if gitea_http_header_permissions_policy else {})
    | combine ({'Strict-Transport-Security': gitea_http_header_strict_transport_security} if gitea_http_header_strict_transport_security and gitea_container_labels_traefik_tls else {})
  }}
gitea_container_labels_traefik_additional_response_headers_custom: {}

# gitea_container_labels_additional_labels contains a multiline string with additional labels to add to the container label file.
# See `../templates/labels.j2` for details.
# To add your own custom labels, use `gitea_container_labels_additional_labels_custom`
#
# Example:
# gitea_container_labels_additional_labels_custom:
#   - my.label=1
#   - another.label="here"
gitea_container_labels_additional_labels: "{{ gitea_container_labels_additional_labels_auto + gitea_container_labels_additional_labels_custom }}"
gitea_container_labels_additional_labels_auto: []
gitea_container_labels_additional_labels_custom: []

# Specify the size of the container's tmpfs volume
gitea_container_tmpfs_tmp_size: 128m

# A list of extra arguments to pass to the container (`docker create` command)
gitea_container_extra_arguments: "{{ gitea_container_extra_arguments_auto + gitea_container_extra_arguments_custom }}"
gitea_container_extra_arguments_auto: []
gitea_container_extra_arguments_custom: []

# Specifies the value of the `X-XSS-Protection` header
# Stops pages from loading when they detect reflected cross-site scripting (XSS) attacks.
#
# Learn more about it is here:
# - https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-XSS-Protection
# - https://portswigger.net/web-security/cross-site-scripting/reflected
gitea_http_header_xss_protection: "1; mode=block"

# Specifies the value of the `X-Content-Type-Options` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-Content-Type-Options
gitea_http_header_content_type_options: nosniff

# Specifies the value of the `Content-Security-Policy` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Content-Security-Policy
gitea_http_header_content_security_policy: frame-ancestors 'self'

# Specifies the value of the `Permissions-Policy` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Permissions-Policy
gitea_http_header_permissions_policy: "{{ 'interest-cohort=()' if gitea_floc_optout_enabled else '' }}"

# Specifies the value of the `Strict-Transport-Security` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Strict-Transport-Security
gitea_http_header_strict_transport_security: "max-age=31536000; includeSubDomains{{ '; preload' if gitea_hsts_preload_enabled else '' }}"

# Controls whether to send a "Permissions-Policy interest-cohort=();" header along with all responses
#
# Learn more about what it is here:
# - https://www.eff.org/deeplinks/2021/03/googles-floc-terrible-idea
# - https://paramdeo.com/blog/opting-your-website-out-of-googles-floc-network
# - https://amifloced.org/
#
# Of course, a better solution is to just stop using browsers (like Chrome), which participate in such tracking practices.
# See: `gitea_http_header_permissions_policy`
gitea_floc_optout_enabled: true

# Controls if HSTS preloading is enabled
#
# In its strongest and recommended form, the [HSTS policy](https://www.chromium.org/hsts) includes all subdomains, and
# indicates a willingness to be "preloaded" into browsers:
# `Strict-Transport-Security: max-age=31536000; includeSubDomains; preload`
# For more information visit:
# - https://en.wikipedia.org/wiki/HTTP_Strict_Transport_Security
# - https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Strict-Transport-Security
# - https://hstspreload.org/#opt-in
# See: `gitea_http_header_strict_transport_security`
gitea_hsts_preload_enabled: false

# List of systemd services that the Gitea systemd service depends on
gitea_systemd_required_services_list: "{{ gitea_systemd_required_services_list_default + gitea_systemd_required_services_list_auto + gitea_systemd_required_services_list_custom }}"
gitea_systemd_required_services_list_default: "{{ [devture_systemd_docker_base_docker_service_name] if devture_systemd_docker_base_docker_service_name else [] }}"
gitea_systemd_required_services_list_auto: []
gitea_systemd_required_services_list_custom: []

# List of systemd services that the Gitea systemd service wants
gitea_systemd_wanted_services_list: "{{ gitea_systemd_wanted_services_list_default + gitea_systemd_wanted_services_list_auto + gitea_systemd_wanted_services_list_custom }}"
gitea_systemd_wanted_services_list_default: []
gitea_systemd_wanted_services_list_auto: []
gitea_systemd_wanted_services_list_custom: []

# Controls how long to wait for the container to stop gracefully before killing it.
gitea_container_stop_grace_time_seconds: "{{ devture_systemd_docker_base_container_stop_grace_time_seconds }}"

# Controls how long the pre-start cleanup should wait for stale container-name release
# before failing startup explicitly.
gitea_container_cleanup_timeout_seconds: "{{ devture_systemd_docker_base_container_cleanup_timeout_seconds }}"

# Controls the delay between pre-start cleanup retries.
gitea_container_cleanup_retry_delay_seconds: "{{ devture_systemd_docker_base_container_cleanup_retry_delay_seconds }}"

# Shell command used in the systemd pre-start phase to deterministically remove a stale
# container and wait until Docker releases its name.
gitea_container_cleanup_command: |
  i=0;
  while [ "$i" -lt {{ gitea_container_cleanup_timeout_seconds }} ]; do
  {{ devture_systemd_docker_base_host_command_docker }} stop -t {{ gitea_container_stop_grace_time_seconds }} {{ gitea_identifier }} >/dev/null 2>&1 || true;
  {{ devture_systemd_docker_base_host_command_docker }} rm -f {{ gitea_identifier }} >/dev/null 2>&1 || true;
  if {{ devture_systemd_docker_base_host_command_docker }} container inspect {{ gitea_identifier }} >/dev/null 2>&1; then
  i=$((i + 1));
  sleep {{ gitea_container_cleanup_retry_delay_seconds }};
  continue;
  fi;
  if {{ devture_systemd_docker_base_host_command_docker }} info >/dev/null 2>&1; then
  exit 0;
  fi;
  echo "Failed to query Docker daemon while cleaning up {{ gitea_identifier }}" >&2;
  exit 1;
  done;
  echo "Failed to remove stale container {{ gitea_identifier }} after {{ gitea_container_cleanup_timeout_seconds }} attempts" >&2;
  exit 1

########################################################################
#                                                                      #
# cache                                                                #
#                                                                      #
########################################################################

# Specify cache adapter
# Valid values: memcache, memory, redis, redis-cluster, twoqueue
# See: https://docs.gitea.com/administration/config-cheat-sheet#cache-cache
gitea_config_cache_adapter: memory

# Control if the connection to Memcached is made via a Unix socket
gitea_cache_memcache_socket_enabled: true

# Specify the path to the Memcached Unix socket path inside the Gitea container
gitea_cache_memcache_socket_path_container: /run-memcached

# Specify the path to the Memcached Unix socket path on the host (bind-mount source)
gitea_cache_memcache_socket_path_host: ""

# Control if the connection to Redis is made via a Unix socket
gitea_cache_redis_socket_enabled: true

# Specify the path to the Redis Unix socket path inside the Gitea container
gitea_cache_redis_socket_path_container: /run-valkey
gitea_redis_socket_path: /valkey.sock

# Specify the path to the Redis Unix socket path on the host (bind-mount source)
gitea_cache_redis_socket_path_host: ""

gitea_config_cache_host: |
  {%- if gitea_config_cache_adapter == 'redis' -%}

  {%- if gitea_cache_redis_socket_enabled -%}
  redis+socket://{{ gitea_cache_redis_socket_path_container + gitea_redis_socket_path }}?db={{ gitea_redis_database }}?pool_size=100&idle_timeout=180s
  {%- else -%}
  redis://{{ gitea_redis_username }}:{{ gitea_redis_password }}@{{ gitea_redis_hostname }}:{{ gitea_redis_port }}/{{ gitea_redis_database }}?pool_size=100&idle_timeout=180s
  {%- endif -%}

  {%- elif gitea_config_cache_adapter == 'redis-cluster' -%}
  redis+cluster://{{ gitea_redis_username }}:{{ gitea_redis_password }}@{{ gitea_redis_hostname }}:{{ gitea_redis_port }}/{{ gitea_redis_database }}?pool_size=100&idle_timeout=180s

  {%- elif gitea_config_cache_adapter == 'memcached' -%}
  {{ gitea_cache_memcache_socket_path_container + '/memcached.sock' if gitea_cache_memcache_socket_enabled else '' }}"

  {%- endif -%}

########################################################################
#                                                                      #
# /cache                                                               #
#                                                                      #
########################################################################

########################################################################
#                                                                      #
# database                                                             #
#                                                                      #
########################################################################

# Specify a database driver to use
# Valid values: mysql, postgres, sqlite
gitea_database_type: ""

# Specify database configuration
gitea_database_mysql_hostname: ""
gitea_database_mysql_port: 3306
gitea_database_mysql_username: gitea
gitea_database_mysql_password: ""
gitea_database_postgres_hostname: ""
gitea_database_postgres_port: 5432
gitea_database_postgres_username: gitea
gitea_database_postgres_password: ""
# Specify SSL mode for MySQL database server
# By default, we expect a local container (without SSL), so attempting SSL connections is not necessary.
# Valid values: see https://docs.gitea.com/administration/config-cheat-sheet#database-database
gitea_database_mysql_sslmode: disable
# Specify SSL mode for Postgres database server
# By default, we expect a local container (without SSL), so attempting SSL connections is not necessary.
# Valid values: see https://docs.gitea.com/administration/config-cheat-sheet#database-database
gitea_database_postgres_sslmode: disable
gitea_database_name: gitea

# Control if the database connection to MySQL is made via a Unix socket
gitea_database_mysql_socket_enabled: true

# Specify the path to the MySQL Unix socket path inside the Gitea container
gitea_database_mysql_socket_path_container: /run-mysqld

# Specify the path to the MySQL Unix socket path on the host (bind-mount source)
gitea_database_mysql_socket_path_host: ""

# Control if the database connection to Postgres is made via a Unix socket
gitea_database_postgres_socket_enabled: true

# Specify the path to the Postgres Unix socket path inside the Gitea container
gitea_database_postgres_socket_path_container: /run-postgres

# Specify the path to the Postgres Unix socket path on the host (bind-mount source)
gitea_database_postgres_socket_path_host: ""

# Specify database host address and port or absolute path for Unix socket
gitea_config_database_host_mysql: "{{ gitea_database_mysql_socket_path_container + '/mysqld.sock' if gitea_database_mysql_socket_enabled else gitea_database_mysql_hostname + ':' + gitea_database_mysql_port | string }}"
gitea_config_database_host_postgres: "{{ gitea_database_postgres_socket_path_container if gitea_database_postgres_socket_enabled else gitea_database_postgres_hostname + ':' + gitea_database_postgres_port | string }}"

########################################################################
#                                                                      #
# /database                                                            #
#                                                                      #
########################################################################

########################################################################
#                                                                      #
# session                                                              #
#                                                                      #
########################################################################

# Specify cache adapter
# Valid values: memory, file, redis, db, mysql, couchbase, memcache, postgres
# See: https://docs.gitea.com/administration/config-cheat-sheet#session-session
gitea_config_session_provider: "{{ 'db' if gitea_database_type != '' else 'memory' }}"

########################################################################
#                                                                      #
# /session                                                             #
#                                                                      #
########################################################################

gitea_redis_hostname: ""
gitea_redis_port: 6379
gitea_redis_username: ""
gitea_redis_password: ""
gitea_redis_database: 0

# Specify issue indexer type
# Valid values: bleve, db, elasticsearch, meilisearch
gitea_environment_variables_indexer_issue_indexer_type: bleve

# Specify issue indexer connection string
# Available when gitea_environment_variables_indexer_issue_indexer_type is `elasticsearch` or `meilisearch`
gitea_environment_variables_indexer_issue_indexer_conn_str: ""

# Enable this to send e-mail to watchers of a repository when something happens, like creating issues. Requires Mailer to be enabled.
# See: https://docs.gitea.com/administration/config-cheat-sheet#service-service
#
# We enable this by default if the mailer is enabled, because it makes sense to have it used for more than just transactional emails.
gitea_config_service_enable_notify_email: "{{ gitea_config_mailer_enabled }}"

gitea_config_mailer_enabled: false
gitea_config_mailer_from: ""
gitea_config_mailer_protocol: ""
gitea_config_mailer_smtp_addr: ""
gitea_config_mailer_smtp_port: 587
gitea_config_mailer_user: ""
gitea_config_mailer_passwd: ""

# Control if the /metrics endpoint for Prometheus is enabled
gitea_config_metrics_enabled: false

gitea_config_root_url: "{{ gitea_scheme }}://{{ gitea_hostname }}{{ gitea_path_prefix }}"

# Controls the `GITEA__server__SSH_LISTEN_PORT` environment variable.
gitea_config_server_ssh_listen_port: 4381 # Random number to avoid collision

# Control if minimum key size with corresponding type is checked
gitea_config_server_minimum_key_size_check: true

# Controls the RUN_USER configuration setting (`GITEA____RUN_USER` environment variable).
#
# This defaults to `git` in the upstream configuration.
#
# On startup, Gitea checks if the resolved username for the user it works with matches the RUN_USER.
#
# Because we run the container with a custom user (gitea_uid),
# and not with uid=1000 matching the git user and inside the container,
# unless we unset this, we'd get an error message:
# > `Expect user 'git' but current user is: `
# The relevant check is here: https://github.com/go-gitea/gitea/blob/ccd3a55bf4f07a390e13d48100c58fb937fd3dcf/modules/setting/setting.go#L297-L300C4
#
# Unsetting this to an empty string makes it match. Unless you gitea_uid accidentally hits some other user that is part of the container's /etc/passwd file.
#
# That said, it seems like the situation has changed (see https://github.com/mother-of-all-self-hosting/mash-playbook/issues/164)
# and we always need to set this to git, regardless of whether `gitea_uid` is 1000 or not.
gitea_config_run_user: git

# Specify the timezone
gitea_environment_variables_tz: UTC

# gitea_environment_variables_additional_variables contains a multiline string with additional environment variables to pass to the container.
#
# Example:
# gitea_environment_variables_additional_variables: |
#   VAR=1
#   ANOTHER=value
gitea_environment_variables_additional_variables: ""

# gitea_restart_necessary controls whether the Gitea systemd
# service will be restarted (when true) or merely started (when false) by the
# systemd service manager role (when conditional restart is enabled).
#
# This value is automatically computed during installation based on whether
# any configuration files, the systemd service file, or the container image changed.
# The default of `false` means "no restart needed" — appropriate when the role's
# installation tasks haven't run (e.g., due to --tags skipping them).
gitea_restart_necessary: false
