---
- name: Check existence of Gitea systemd service
  ansible.builtin.stat:
    path: "{{ devture_systemd_docker_base_systemd_path }}/{{ gitea_identifier }}.service"
  register: gitea_service_stat

- name: Uninstall Gitea systemd services and files
  when: gitea_service_stat.stat.exists | bool
  block:
    - name: Ensure Gitea systemd service is stopped
      ansible.builtin.service:
        name: "{{ gitea_identifier }}"
        state: stopped
        enabled: false
        daemon_reload: true

    - name: Ensure Gitea systemd service does not exist
      ansible.builtin.file:
        path: "{{ devture_systemd_docker_base_systemd_path }}/{{ gitea_identifier }}.service"
        state: absent

    - name: Ensure Gitea support files do not exist
      ansible.builtin.file:
        path: "{{ gitea_base_path }}/{{ item }}"
        state: absent
      with_items:
        - env
        - labels

    - name: Ensure Gitea image source files path does not exist
      ansible.builtin.file:
        path: "{{ gitea_container_image_self_build_src_files_path }}"
        state: absent

    - name: Ensure Gitea local config path does not exist if empty
      ansible.builtin.command:
        cmd: "rmdir {{ gitea_config_path }}"
      register: gitea_config_path_deletion_result
      changed_when: gitea_config_path_deletion_result.rc == 0
      failed_when: false

    - name: Ensure Gitea local data path does not exist if empty
      ansible.builtin.command:
        cmd: "rmdir {{ gitea_data_path }}"
      register: gitea_data_path_deletion_result
      changed_when: gitea_data_path_deletion_result.rc == 0
      failed_when: false

    - name: Ensure Gitea base path does not exist if empty
      ansible.builtin.command:
        cmd: "rmdir {{ gitea_base_path }}"
      register: gitea_base_path_deletion_result
      changed_when: gitea_base_path_deletion_result.rc == 0
      failed_when: false

    - name: Ensure Gitea container network does not exist
      when: gitea_container_network_deletion_enabled
      block:
        - name: Ensure Gitea container network does not exist via community.docker.docker_network
          when: devture_systemd_docker_base_container_network_creation_method == 'ansible-module'
          community.docker.docker_network:
            name: "{{ gitea_container_network }}"
            state: absent
          register: gitea_network_deletion_result

        - name: Ensure Gitea container network does not exist via ansible.builtin.command
          when: devture_systemd_docker_base_container_network_creation_method == 'command'
          ansible.builtin.command:
            cmd: >-
              {{ devture_systemd_docker_base_host_command_docker }} network rm
              {{ gitea_container_network }}
          register: gitea_network_deletion_result
          changed_when: gitea_container_network in gitea_network_deletion_result.stdout

- name: Check existence of Gitea local data path
  ansible.builtin.stat:
    path: "{{ gitea_data_path }}"
  register: gitea_data_path_stat

# We just want to notify the user. Deleting data is too destructive.
- name: Inject the message about the remaining Gitea local data path
  when: gitea_data_path_stat.stat.exists | bool
  ansible.builtin.set_fact:
    devture_playbook_runtime_messages_list: |
      {{
        devture_playbook_runtime_messages_list | default([])
        +
        [
          "Note: As the local Gitea instance has been removed, some old data remains in `" + gitea_data_path + "`. Feel free to delete it."
        ]
      }}

- name: Check existence of Gitea config path
  ansible.builtin.stat:
    path: "{{ gitea_config_path }}"
  register: gitea_config_path_stat

# We just want to notify the user. Deleting data is too destructive.
- name: Inject the message about the remaining Gitea config path
  when: gitea_config_path_stat.stat.exists | bool
  ansible.builtin.set_fact:
    devture_playbook_runtime_messages_list: |
      {{
        devture_playbook_runtime_messages_list | default([])
        +
        [
          "Note: As the local Gitea instance has been removed, some config data remains in `" + gitea_config_path + "`. Feel free to delete it."
        ]
      }}
