---
- name: (Deprecation) Catch and report renamed settings
  ansible.builtin.fail:
    msg: >-
      Your configuration contains a variable, which now has a different name.
      Please change your configuration to rename the variable (`{{ item.old }}` -> `{{ item.new }}`).
  when: "lookup('ansible.builtin.varnames', ('^' + item.old + '$'), wantlist=True) | length > 0"
  with_items:
    - { "old": "gitea_data_dir_path", "new": "gitea_data_path" }
    - { "old": "gitea_config_dir_path", "new": "gitea_config_path" }
    - { "old": "gitea_http_bind_port", "new": "gitea_container_http_host_bind_port" }
    - { "old": "gitea_ssh_port", "new": "gitea_container_ssh_port" }
    - { "old": "gitea_ssh_bind_port", "new": "gitea_container_ssh_host_bind_port" }
    - { "old": "gitea_config_server_ssh_port", "new": "gitea_container_ssh_port" }
    - { "old": "gitea_systemd_required_systemd_services_list", "new": "gitea_systemd_required_services_list" }
    - { "old": "gitea_systemd_required_systemd_services_list_default", "new": "gitea_systemd_required_services_list_default" }
    - { "old": "gitea_systemd_required_systemd_services_list_auto", "new": "gitea_systemd_required_services_list_auto" }
    - { "old": "gitea_systemd_required_systemd_services_list_custom", "new": "gitea_systemd_required_services_list_custom" }
    - { "old": "gitea_config_database_type", "new": "gitea_database_type" }
    - { "old": "gitea_config_database_hostname", "new": "gitea_database_hostname" }
    - { "old": "gitea_config_database_port", "new": "gitea_database_port" }
    - { "old": "gitea_config_database_name", "new": "gitea_database_name" }
    - { "old": "gitea_config_database_username", "new": "gitea_database_username" }
    - { "old": "gitea_config_database_password", "new": "gitea_database_password" }
    - { "old": "gitea_database_hostname", "new": "<Replace with gitea_database_mysql_hostname or gitea_database_postgres_hostname>" }
    - { "old": "gitea_database_port", "new": "<Replace with gitea_database_mysql_port or gitea_database_postgres_port>" }
    - { "old": "gitea_database_username", "new": "<Replace with gitea_database_mysql_username or gitea_database_postgres_username>" }
    - { "old": "gitea_database_password", "new": "<Replace with gitea_database_mysql_password or gitea_database_postgres_password>" }
    - { "old": "gitea_container_additional_environment_variables", "new": "gitea_environment_variables_additional_variables" }
    - { "old": "gitea_http_header_content_permission_policy", "new": "gitea_http_header_permissions_policy" }

- name: Fail if required Gitea settings not defined
  ansible.builtin.fail:
    msg: >-
      You need to define a required configuration setting (`{{ item.name }}`) for using this role.
  when: "item.when | bool and lookup('vars', item.name, default='') | string | length == 0"
  with_items:
    - { "name": "gitea_uid", when: true }
    - { "name": "gitea_gid", when: true }
    - { "name": "gitea_hostname", when: true }
    - { "name": "gitea_path_prefix", when: true }
    - { "name": "gitea_container_network", when: true }
    - { "name": "gitea_database_type", when: true }
    - { "name": "gitea_container_labels_traefik_metrics_middleware_basic_auth_users", when: "{{ gitea_container_labels_traefik_metrics_middleware_basic_auth_enabled }}"}
    - "name": "gitea_container_labels_traefik_compression_middleware_name"
      when: "{{ gitea_container_labels_traefik_compression_middleware_enabled }}"

- name: Fail if Gitea cache adapter type is invalid
  ansible.builtin.fail:
    msg: >-
      gitea_config_cache_adapter must be 'memcache', 'memory', 'redis', 'redis-cluster', or 'twoqueue'
  when: "gitea_config_cache_adapter not in ['memcache', 'memory', 'redis', 'redis-cluster', 'twoqueue']"

- name: Fail if Gitea database type invalid
  ansible.builtin.fail:
    msg: >-
      gitea_database_type must be 'mysql', 'postgres' or 'sqlite'
  when: "gitea_database_type not in ['mysql', 'postgres', 'sqlite']"

- name: Run if Gitea + MySQL integration is enabled
  when: gitea_database_type == 'mysql'
  block:
    - name: Fail if required Gitea + MySQL integration settings not defined
      ansible.builtin.fail:
        msg: >-
          You need to define a required configuration setting (`{{ item }}`) when `gitea_database_type` is `mysql`
      when: "lookup('vars', item, default='') | string | length == 0"
      with_items:
        - gitea_database_mysql_password

    - name: Fail if MySQL socket host path for Gitea is missing when Unix socket is enabled
      ansible.builtin.fail:
        msg: >-
          You need to define `gitea_database_mysql_socket_path_host` when `gitea_database_type` is `mysql`
          and `gitea_database_mysql_socket_enabled` is `true`.
      when: >-
        gitea_database_mysql_socket_enabled and
        gitea_database_mysql_socket_path_host | string | length == 0

    - name: Fail if MySQL hostname for Gitea is missing when Unix socket is disabled
      ansible.builtin.fail:
        msg: >-
          You need to define `gitea_database_mysql_hostname` when `gitea_database_type` is `mysql`
          and `gitea_database_mysql_socket_enabled` is `false`.
      when: >-
        not gitea_database_mysql_socket_enabled and
        gitea_database_mysql_hostname | string | length == 0

    - name: Fail if MySQL SSL/TLS encryption mode for Gitea invalid
      ansible.builtin.fail:
        msg: >-
          gitea_database_mysql_sslmode must be 'true', 'false', 'disable', 'skip-verify', or 'prefer'
      when: "gitea_database_mysql_sslmode not in ['true', 'false', 'disable', 'skip-verify', 'prefer']"

- name: Run if Gitea + Postgres integration is enabled
  when: gitea_database_type == 'postgres'
  block:
    - name: Fail if required Gitea + Postgres integration settings not defined
      ansible.builtin.fail:
        msg: >-
          You need to define a required configuration setting (`{{ item }}`) when `gitea_database_type` is `postgres`
      when: "lookup('vars', item, default='') | string | length == 0"
      with_items:
        - gitea_database_postgres_password

    - name: Fail if Postgres socket host path for Gitea is missing when Unix socket is enabled
      ansible.builtin.fail:
        msg: >-
          You need to define `gitea_database_postgres_socket_path_host` when `gitea_database_type` is `postgres`
          and `gitea_database_postgres_socket_enabled` is `true`.
      when: >-
        gitea_database_postgres_socket_enabled and
        gitea_database_postgres_socket_path_host | string | length == 0

    - name: Fail if Postgres hostname for Gitea is missing when Unix socket is disabled
      ansible.builtin.fail:
        msg: >-
          You need to define `gitea_database_postgres_hostname` when `gitea_database_type` is `postgres`
          and `gitea_database_postgres_socket_enabled` is `false`.
      when: >-
        not gitea_database_postgres_socket_enabled and
        gitea_database_postgres_hostname | string | length == 0

    - name: Fail if Postgres SSL/TLS encryption mode for Gitea invalid
      ansible.builtin.fail:
        msg: >-
          gitea_database_postgres_sslmode must be 'disable', 'require', 'verify-ca', or 'verify-full'
      when: "gitea_database_postgres_sslmode not in ['disable', 'require', 'verify-ca', 'verify-full']"

- name: Run if Gitea + Memcached integration is enabled
  when: gitea_config_cache_adapter == 'memcache'
  block:
    - name: Fail if Memcached socket host path for Gitea is missing when Unix socket is enabled
      ansible.builtin.fail:
        msg: >-
          You need to define `gitea_cache_memcache_socket_path_host` when `gitea_config_cache_adapter` is `memcache`
          and `gitea_cache_memcache_socket_enabled` is `true`.
      when: >-
        gitea_cache_memcache_socket_enabled and
        gitea_cache_memcache_socket_path_host | string | length == 0

    - name: Fail if Memcached host setting for Gitea is missing when Unix socket is disabled
      ansible.builtin.fail:
        msg: >-
          You need to define `gitea_config_cache_host` when `gitea_config_cache_adapter` is `memcache`
          and `gitea_cache_memcache_socket_enabled` is `false`.
      when: >-
        not gitea_cache_memcache_socket_enabled and
        gitea_config_cache_host | string | length == 0

- name: Run if Gitea + Redis integration is enabled
  when: gitea_config_cache_adapter == 'redis'
  block:
    - name: Fail if both Redis hostname and socket host path for Gitea are set
      ansible.builtin.fail:
        msg: >-
          You may need to define either `gitea_redis_hostname` or `gitea_cache_redis_socket_path_host` to enable Redis integration.
      when: >-
        gitea_redis_hostname | string | length != 0 and
        gitea_cache_redis_socket_path_host | string | length != 0

    - name: Fail if Redis hostname for Gitea is set when Unix socket is enabled
      ansible.builtin.fail:
        msg: >-
          You need to define `gitea_cache_redis_socket_path_host` and remove `gitea_redis_hostname` to enable Redis integration,
          when `gitea_cache_redis_socket_enabled` is `true`.
          Check the documentation for details.
          You may remove the Redis service from `gitea_container_additional_networks_custom` if specified.
      when: >-
        gitea_redis_hostname | string | length != 0 and
        gitea_cache_redis_socket_enabled

    - name: Fail if Redis socket host path for Gitea is set when Unix socket is not enabled
      ansible.builtin.fail:
        msg: >-
          You need to define `gitea_redis_hostname` and remove `gitea_cache_redis_socket_path_host` to enable Redis integration,
          when `gitea_cache_redis_socket_enabled` is `false`.
          Check the documentation for details.
          You may also need to specify the Redis service to `gitea_container_additional_networks_custom` if it does not exist on the same network.
      when: >-
        gitea_cache_redis_socket_path_host | string | length != 0 and
        not gitea_cache_redis_socket_enabled

- name: Fail if SMTP settings are missing (and SMTP is enabled by setting host)
  ansible.builtin.fail:
    msg: >-
      You need to define a required configuration setting (`{{ item }}`) to correctly set up email via SMTP.
  when: "gitea_config_mailer_enabled | bool and lookup('vars', item, default='') | string | length == 0"
  with_items:
    - gitea_config_mailer_smtp_addr
    - gitea_config_mailer_from

- name: Run if Traefik is enabled
  when: gitea_container_labels_traefik_enabled | bool
  block:
    - name: Fail if Traefik settings required for Gitea are not defined
      ansible.builtin.fail:
        msg: >-
          You need to define a required configuration setting (`{{ item }}`).
      when: "lookup('vars', item, default='') | string | length == 0"
      with_items:
        - gitea_container_labels_traefik_hostname
        - gitea_container_labels_traefik_path_prefix

    # We ensure it doesn't end with a slash, because we handle both (slash and no-slash).
    # Knowing that `gitea_container_labels_traefik_path_prefix` does not end with a slash
    # ensures we know how to set these routes up without having to do "does it end with a slash" checks elsewhere.
    - name: Fail if gitea_container_labels_traefik_path_prefix ends with a slash
      ansible.builtin.fail:
        msg: >-
          gitea_container_labels_traefik_path_prefix (`{{ gitea_container_labels_traefik_path_prefix }}`) must either be `/` or not end with a slash (e.g. `/gitea`).
      when: "gitea_container_labels_traefik_path_prefix != '/' and gitea_container_labels_traefik_path_prefix[-1] == '/'"

- name: Run if Traefik is enabled for Prometheus endpoint
  when: gitea_container_labels_traefik_metrics_enabled | bool
  block:
    - name: Fail if Traefik settings required for Gitea metrics endpoint are not defined
      ansible.builtin.fail:
        msg: >-
          You need to define a required configuration setting (`{{ item }}`).
      when: "lookup('vars', item, default='') | string | length == 0"
      with_items:
        - gitea_container_labels_traefik_metrics_hostname
        - gitea_container_labels_traefik_metrics_path_prefix

    # We ensure it doesn't end with a slash, because we handle both (slash and no-slash).
    # Knowing that `gitea_container_labels_traefik_metrics_path_prefix` does not end with a slash
    # ensures we know how to set these routes up without having to do "does it end with a slash" checks elsewhere.
    - name: Fail if gitea_container_labels_traefik_metrics_path_prefix ends with a slash
      ansible.builtin.fail:
        msg: >-
          gitea_container_labels_traefik_metrics_path_prefix (`{{ gitea_container_labels_traefik_metrics_path_prefix }}`) must either be `/` or not end with a slash (e.g. `/metrics`).
      when: "gitea_container_labels_traefik_metrics_path_prefix != '/' and gitea_container_labels_traefik_metrics_path_prefix[-1] == '/'"
